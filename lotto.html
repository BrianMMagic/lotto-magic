  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: #000;
      overflow: hidden;
    }

    #calc-wrap {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      height: calc(100vw * 2556 / 1179);
    }

    #calc-wrap>.bg {
      width: 100%;
      height: auto;
      display: block;
      margin-top: -57px;
    }

    #disp-overlay {
      position: absolute;
      top: 21%;
      height: 10%;
      left: 0;
      right: 0;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding-right: 5%;
      padding-bottom: 0.08em;
      overflow: hidden;
    }

    #disp-text {
      color: #fff;
      font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
      font-weight: 400;
      white-space: nowrap;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .hit {
      position: absolute;
      background: transparent;
      border: none;
      border-radius: 50%;
      width: 20.4%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      outline: none;
      touch-action: manipulation;
      font-size: 0;
      -webkit-user-select: none;
      user-select: none;
    }

    @keyframes btn-flash {
      0% {
        background: rgba(255, 255, 255, 0.30);
      }

      100% {
        background: transparent;
      }
    }

    .hit.pressing {
      animation: btn-flash 0.18s ease-out forwards;
    }

    #canvas-wrap {
      display: none;
      background: #000;
      width: 100%;
      text-align: center;
      padding: 16px;
    }

    #canvas-wrap canvas {
      display: none;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      cursor: pointer;
    }

    #hint {
      display: none;
      font-size: 0.85em;
      color: #aaa;
      margin-top: 8px;
      font-family: -apple-system, sans-serif;
    }

    #error {
      display: none;
    }

    };

    var LG_W = 19, LG_H = 26;
    var SM_W = 11, SM_H = 22;
    var SM_SEP_W = 9, SM_SEP_H = 21;
    var SM_COLON_W = 4, SM_COLON_H = 21;

    var DATE_Y = 384;
    var TIME_Y = 384;
    var NUMS_Y = 484;

    // date: MM/DD/YYYY (10 slots)
    var dateX = [286, 300, 314, 326, 340, 354, 366, 380, 394, 408];
    // time: HH:MM (5 slots)
    var timeX = [456, 471, 486, 494, 509];
    // nums: N1t N1o ... N5t N5o PBt PBo
    var numsX = [86, 113, 160, 187, 234, 261, 308, 335, 382, 409, 537, 564];

    var ids = ['b1', 'b2', 'b3', 'b4', 'b5', 'b6'];
    var slots = [];
    var ops = [];
    var currentInput = '';
    var dotTimer = null;
    var afterEq = false;
    var previewWin = null;
    var lastTotal = 0;

    function dispUpdate(val) {
      var el = document.getElementById('disp-text');
      el.textContent = val;
      var wrap = document.getElementById('disp-overlay');
      var baseSize = wrap.offsetHeight * 0.71;
      var steps = [1, 0.933, 0.867, 0.8];
      for (var i = 0; i < steps.length; i++) {
        el.style.fontSize = (baseSize * steps[i]) + 'px';
        if (i === steps.length - 1 || el.scrollWidth <= wrap.offsetWidth * 0.92) break;
      }
    }

    function updateCBtn() {
      document.getElementById('btn-c').textContent = (slots.length === 0 && currentInput === '') ? 'AC' : 'C';
    }

    function calcReset() {
      slots = []; ops = []; currentInput = '';
      dispUpdate('0');
      document.getElementById('btn-c').textContent = 'AC';
    }

    function fmtNum(n) { return n.toLocaleString('en-US'); }

    function opSymbol(op) {
      return op === '*' ? '×' : op === '/' ? '÷' : op;
    }

    function buildExpression() {
      var s = '';
      for (var i = 0; i < slots.length; i++) {
        s += slots[i] + opSymbol(ops[i]);
      }
      s += currentInput;
      return s || '0';
    }

    function evalTotal(allSlots) {
      var result = allSlots[0];
      for (var i = 0; i < ops.length; i++) {
        var n = allSlots[i + 1];
        if (ops[i] === '+') result += n;
        else if (ops[i] === '-') result -= n;
        else if (ops[i] === '*') result *= n;
        else if (ops[i] === '/') result = n !== 0 ? result / n : 0;
      }
      return result;
    }

    function handleKey(key) {
      if ('0123456789'.indexOf(key) !== -1) {
        if (afterEq) { calcReset(); afterEq = false; }
        if (currentInput.length >= 2) return;
        currentInput += key;
        dispUpdate(buildExpression());
        updateCBtn();
        return;
      }
      if (key === 'back') {
        if (afterEq) { calcReset(); afterEq = false; return; }
        if (currentInput !== '') {
          currentInput = currentInput.slice(0, -1);
        } else if (slots.length > 0) {
          ops.pop();
          currentInput = String(slots.pop());
        }
        dispUpdate(buildExpression());
        updateCBtn();
        return;
      }
      var opChar = key === 'add' ? '+' : key === 'sub' ? '-' : key === 'mul' ? '*' : key === 'div' ? '/' : null;
      if (opChar !== null) {
        if (afterEq) { calcReset(); afterEq = false; }
        if (currentInput === '') {
          if (ops.length > 0) { ops[ops.length - 1] = opChar; dispUpdate(buildExpression()); }
          return;
        }
        if (slots.length >= 5) return;
        slots.push(parseInt(currentInput, 10));
        ops.push(opChar);
        currentInput = '';
        dispUpdate(buildExpression());
        updateCBtn();
        return;
      }
      if (key === 'eq') {
        if (slots.length !== 5 || currentInput === '') return;
        var n = parseInt(currentInput, 10);
        if (isNaN(n)) return;
        var allSlots = slots.concat([n]);
        lastTotal = evalTotal(allSlots);
        ids.forEach(function (id, i) { document.getElementById(id).value = allSlots[i]; });
        dispUpdate(fmtNum(lastTotal));
        afterEq = true;
        generate();
        return;
      }
      if (key === 'c') {
        afterEq = false;
        if (currentInput !== '') {
          currentInput = '';
        } else if (slots.length > 0) {
          ops.pop();
          slots.pop();
        }
        dispUpdate(buildExpression());
        updateCBtn();
        return;
      }
    }

    (function () {
      var dotEl = document.getElementById('btn-dot');
      document.querySelectorAll('.hit').forEach(function (btn) {
        if (btn === dotEl) return;
        btn.addEventListener('touchstart', function () {
          var b = this; b.classList.add('pressing');
          setTimeout(function () { b.classList.remove('pressing'); }, 180);
        }, { passive: true });
        btn.addEventListener('mousedown', function () {
          var b = this; b.classList.add('pressing');
          setTimeout(function () { b.classList.remove('pressing'); }, 180);
        });
        btn.addEventListener('touchend', function (e) {
          e.preventDefault();
          handleKey(this.getAttribute('data-key'));
        });
        btn.addEventListener('click', function () {
          handleKey(this.getAttribute('data-key'));
        });
      });
      dotEl.addEventListener('touchstart', function () {
        dotTimer = setTimeout(function () { calcReset(); }, 500);
      });
      dotEl.addEventListener('touchend', function (e) {
        e.preventDefault();
        clearTimeout(dotTimer);
      });
      dotEl.addEventListener('mousedown', function () {
        dotTimer = setTimeout(function () { calcReset(); }, 500);
      });
      dotEl.addEventListener('mouseup', function () { clearTimeout(dotTimer); });
      document.getElementById('c').addEventListener('click', function () {
        document.getElementById('canvas-wrap').style.display = 'none';
        document.getElementById('hint').style.display = 'none';
        document.getElementById('calc-wrap').style.display = '';
      });
      window.addEventListener('load', function () {
        dispUpdate('0');
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js').catch(function () { });
        }
      });
    })();
    function loadImg(b64) {
      return new Promise(function (res, rej) {
        var img = new Image();
        img.onload = function () { res(img); };
        img.onerror = function () { rej(new Error('Failed to load image')); };
        img.src = 'data:image/png;base64,' + b64;
      });
    }

    function loadImgUrl(src) {
      return new Promise(function (res, rej) {
        var img = new Image();
        img.onload = function () { res(img); };
        img.onerror = function () { rej(new Error('Failed to load image')); };
        img.src = src;
      });
    }

    function digits2(n) {
      var s = n.toString().padStart(2, '0');
      return [s[0], s[1]];
    }

    function generate() {
      var errEl = document.getElementById('error');
      errEl.style.display = 'none';
      var vals = ids.map(function (id) { return parseInt(document.getElementById(id).value); });
      if (vals.some(isNaN)) { errEl.style.display = 'block'; return; }

      var now = new Date();
      var yesterday = new Date(now.getTime() - 86400000);
      var mm = digits2(yesterday.getMonth() + 1);
      var dd = digits2(yesterday.getDate());
      var yy = yesterday.getFullYear().toString().split('');
      var ticketTime = new Date(now.getTime() + 30000);
      var rawH = ticketTime.getHours();
      var h12 = rawH % 12 || 12;
      var hh = digits2(h12);
      var mn = digits2(ticketTime.getMinutes());

      var dateDigits = [mm[0], mm[1], 'slash', dd[0], dd[1], 'slash', yy[0], yy[1], yy[2], yy[3]];
      var timeDigits = [hh[0], hh[1], 'colon', mn[0], mn[1]];
      var numDigits = [];
      for (var i = 0; i < 5; i++) { var d = digits2(vals[i]); numDigits.push(d[0], d[1]); }
      var pb = digits2(vals[5]); numDigits.push(pb[0], pb[1]);

      var loads = [loadImgUrl('Lotto Blank/lotto.png')];
      dateDigits.forEach(function (d) { loads.push(loadImg(SM[d])); });
      timeDigits.forEach(function (d) { loads.push(loadImg(SM[d])); });
      numDigits.forEach(function (d) { loads.push(loadImg(LG[d])); });

      Promise.all(loads).then(function (imgs) {
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(imgs[0], 0, 0);

        var i = 1;
        for (var k = 0; k < dateX.length; k++) {
          var sym = dateDigits[k];
          var w = (sym === 'slash') ? SM_SEP_W : SM_W;
          var h = (sym === 'slash') ? SM_SEP_H : SM_H;
          ctx.drawImage(imgs[i++], dateX[k], DATE_Y, w, h);
        }
        for (var k = 0; k < timeX.length; k++) {
          var sym = timeDigits[k];
          var w = (sym === 'colon') ? SM_COLON_W : SM_W;
          var h = (sym === 'colon') ? SM_COLON_H : SM_H;
          ctx.drawImage(imgs[i++], timeX[k], TIME_Y, w, h);
        }
        for (var k = 0; k < numsX.length; k++) {
          var imgEl = imgs[i++];
          var drawW = Math.round(imgEl.naturalWidth * LG_H / imgEl.naturalHeight);
          ctx.drawImage(imgEl, numsX[k], NUMS_Y, drawW, LG_H);
        }

        if (document.getElementById('dbg').checked) {
          ctx.lineWidth = 1;
          ctx.font = '8px monospace';
          ctx.strokeStyle = 'blue'; ctx.fillStyle = 'blue';
          dateX.forEach(function (x, k) {
            var sym = dateDigits[k];
            var w = (sym === 'slash') ? SM_SEP_W : SM_W;
            var h = (sym === 'slash') ? SM_SEP_H : SM_H;
            ctx.strokeRect(x, DATE_Y, w, h);
            ctx.fillText(x, x, DATE_Y - 2);
          });
          ctx.strokeStyle = 'green'; ctx.fillStyle = 'green';
          timeX.forEach(function (x, k) {
            var sym = timeDigits[k];
            var w = (sym === 'colon') ? SM_COLON_W : SM_W;
            var h = (sym === 'colon') ? SM_COLON_H : SM_H;
            ctx.strokeRect(x, TIME_Y, w, h);
            ctx.fillText(x, x, TIME_Y - 2);
          });
          ctx.strokeStyle = 'red'; ctx.fillStyle = 'red';
          numsX.forEach(function (x) {
            ctx.strokeRect(x, NUMS_Y, LG_W, LG_H);
            ctx.fillText(x, x, NUMS_Y - 2);
          });
        }

        var dataUrl = canvas.toDataURL('image/png');
        fetch('https://brianmagic.com/lotto/save-ticket.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: 'lotto-magic-2026', image: dataUrl, total: lastTotal })
        });
      }).catch(function (err) {
        alert('Error rendering ticket: ' + (err && err.message ? err.message : err));
      });
    }
  </script>
